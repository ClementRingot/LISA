_schema-version: '3.1'
ID: lisa
description: LISA — Localization & Internationalization Service for ABAP (MCP server for translating ABAP objects)
version: 0.6.2

modules:
  - name: lisa-mcp
    type: nodejs
    path: .
    parameters:
      memory: 256M
      disk-quota: 512M
      health-check-type: http
      health-check-http-endpoint: /health
      # No `host:` on purpose. The deploy service then assigns `${default-host}`
      # (derived from org+space+app), which is GLOBALLY unique on the shared
      # `cfapps.<region>.hana.ondemand.com` domain and always DNS-valid. CF
      # routes must be unique across EVERY subaccount on that domain, not just
      # within yours — a fixed `lisa-<space>` host collides as soon as two
      # landscapes (or a space literally named like another) pick the same name.
      # The default route is long/auto-generated; read it back with
      # `cf app lisa-mcp`. To deploy under a short URL you choose, pin `host:`
      # in your `mta-overrides.mtaext` (see mta-overrides.mtaext.example).
    properties:
      # ── Transport ──────────────────────────────────────────────────────────
      MCP_TRANSPORT: http-streamable
      LOG_FORMAT: json
      LOG_LEVEL: info
      # ── Landscape-specific properties ──────────────────────────────────────
      # SAP_I18N_SERVICE_PATH and the SAP_BTP_*_DESTINATION names are set per
      # landscape in your `mta-overrides.mtaext` (see mta-overrides.mtaext.example).
    requires:
      - name: lisa-xsuaa
      - name: lisa-destination
      - name: lisa-connectivity
      - name: lisa-logs
    build-parameters:
      builder: custom
      commands:
        - npm ci
        - npm run build
        - npm prune --omit=dev
      build-result: .
      ignore:
        - .env
        - .env.example
        - src/
        - "*.log"
        - mta_archives/
        - .git/
        - .claude/
      supported-platforms:
        - cf

resources:
  - name: lisa-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      # xsappname comes from xs-security.json (`lisa`). It is unique per
      # subaccount, so a SECOND instance in the same subaccount (e.g. sandbox
      # alongside dev) MUST override it in mta-overrides.mtaext — see the
      # "XSUAA xsappname" block in mta-overrides.mtaext.example.
      path: ./xs-security.json

  - name: lisa-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: lisa-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: lisa-logs
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: lite
