_schema-version: '3.1'
ID: lisa
description: LISA — Localization & Internationalization Service for ABAP (MCP server for translating ABAP objects)
version: 0.8.2

modules:
  - name: lisa-mcp
    type: nodejs
    path: .
    parameters:
      memory: 256M
      disk-quota: 512M
      health-check-type: http
      health-check-http-endpoint: /health
      # No `host:` on purpose. The deploy service then assigns `${default-host}`
      # (derived from org+space+app), which is GLOBALLY unique on the shared
      # `cfapps.<region>.hana.ondemand.com` domain and always DNS-valid. CF
      # routes must be unique across EVERY subaccount on that domain, not just
      # within yours — a fixed `lisa-<space>` host collides as soon as two
      # landscapes (or a space literally named like another) pick the same name.
      # The default route is long/auto-generated; read it back with
      # `cf app lisa-mcp`. To deploy under a short URL you choose, pin `host:`
      # in your `mta-overrides.mtaext` (see mta-overrides.mtaext.example).
    properties:
      # ── Transport ──────────────────────────────────────────────────────────
      MCP_TRANSPORT: http-streamable
      LOG_FORMAT: json
      LOG_LEVEL: info
      # ── Landscape-specific properties ──────────────────────────────────────
      # SAP_I18N_SERVICE_PATH and the SAP_BTP_*_DESTINATION names are set per
      # landscape in your `mta-overrides.mtaext` (see mta-overrides.mtaext.example).
    requires:
      - name: lisa-xsuaa
      - name: lisa-destination
      # lisa-connectivity and lisa-logs are declared `active: false` below, so
      # these two `requires` are IGNORED by the deploy service by default (an
      # inactive resource silently drops every `requires` that points at it).
      # Re-activate the resource in an mtaext to re-enable the binding — the
      # on-premise template turns `lisa-connectivity` back on (Cloud Connector).
      - name: lisa-connectivity
      - name: lisa-logs
    build-parameters:
      builder: custom
      commands:
        - npm ci --workspace packages/core --workspace packages/server
        - npm run build --workspace packages/core --workspace packages/server
        - npm prune --omit=dev
      build-result: .
      ignore:
        - .env
        - .env.example
        - packages/*/src/
        - "*.log"
        - mta_archives/
        - .git/
        - .claude/
      supported-platforms:
        - cf

resources:
  - name: lisa-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      # xsappname comes from xs-security.json (`lisa`). It is unique per
      # subaccount, so a SECOND instance in the same subaccount (e.g. sandbox
      # alongside dev) MUST override it in mta-overrides.mtaext — see the
      # "XSUAA xsappname" block in mta-overrides.mtaext.example.
      path: ./xs-security.json

  - name: lisa-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: lisa-connectivity
    # OFF by default: the Connectivity service is only needed for the ON-PREMISE
    # (Cloud Connector) scenario. The BTP ABAP Environment and S/4HANA Cloud
    # Public Edition are Internet-facing (ProxyType=Internet) and never touch it
    # — binding it there is dead weight. The on-premise template re-activates it
    # (`resources: - name: lisa-connectivity / active: true`).
    active: false
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: lisa-logs
    # OFF by default: SAP removed Application Logging from the eligible services
    # on 2025-07-31 (SAP Note 3557260). On subaccounts that no longer offer the
    # `application-logs` service, binding it HARD-FAILS the deploy. LISA logs to
    # stderr regardless, so `cf logs lisa-mcp` keeps working without it. Re-enable
    # it on subaccounts that still have the service via an mtaext:
    #   resources:
    #     - name: lisa-logs
    #       active: true
    active: false
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: lite
