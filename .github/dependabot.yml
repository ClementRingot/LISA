# Dependabot — automated dependency-update PRs (CI runs on each, so a bump that
# breaks lint/test/build/check:version never merges). Weekly to keep noise low;
# updates are grouped so you review batches, not one PR per package.
#
# Three ecosystems live in this repo:
#   - npm     — the workspaces (one lockfile at the root covers core/server/arc1-extension)
#   - docker  — the runtime base image in ./Dockerfile (node:22-alpine)
#   - actions — the workflows under .github/workflows/
version: 2
updates:
  # ── npm workspaces ──────────────────────────────────────────────────────────
  # A single entry at "/" covers all three packages: there's one root
  # package-lock.json, and Dependabot follows the workspaces from it.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    groups:
      # The ARC-1 host API and its extracted auth package. Kept in their OWN
      # group (all update types) so host-compatibility bumps land in one PR you
      # review deliberately — `arc-1` is the plugin API the extension builds
      # against; `@arc-mcp/xsuaa-auth` is the server's auth layer.
      arc-mcp:
        patterns:
          - "arc-1"
          - "@arc-mcp/*"
      # Everything else: batch minor + patch into a single weekly PR. Majors are
      # excluded here so they arrive as individual PRs (they can break).
      npm-minor-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "arc-1"
          - "@arc-mcp/*"
        update-types:
          - "minor"
          - "patch"

  # ── Docker base image (./Dockerfile) ───────────────────────────────────────
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"

  # ── GitHub Actions (.github/workflows/) ─────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
